# LB nginx config (⑦ 상시 트래픽 시뮬레이터 소유) — docker-compose.lb.yml의 nginx-lb가 마운트한다.
#
# 근거: TDD.md "nginx LB 설계"(FR-1). mcp.conf(MCP 전용 443 엔드포인트, ⑧/DevOps 소유)는 무수정 —
#       이 파일은 앱 전체(/) 앞에 서는 별도 인그레스다.
#
# 핵심: backend가 deploy.replicas:3으로 뜨면 Docker 임베디드 DNS(127.0.0.11)가 `backend`에 3개 IP를
#       반환한다. nginx가 `upstream { server backend:8080; }` 형태로 정적 upstream을 쓰면 시작 시점에
#       IP를 1회만 resolve해 캐시하므로 라운드로빈이 되지 않는다. 이를 피하기 위해:
#         1) `resolver 127.0.0.11 valid=10s`로 DNS TTL을 짧게 재해석
#         2) location 안에서 변수(`set $pool backend`)로 proxy_pass 대상을 만들어 매 요청마다 재해석
#       이 두 가지를 함께 써야 실제로 3 replica에 요청이 분산된다.
#
# mcp.conf는 정적 `upstream sports_backend { server ...; keepalive 64; }` 블록을 쓴다 — 이 파일은
# 그 이름 관례만 계승하고 실체는 만들지 않는다. 정적 upstream 블록은 nginx 시작·reload 시점에 호스트명을
# 1회 resolve하므로(라운드로빈 실패 원인이자, backend 컨테이너가 아직 없으면 nginx 자체가 기동 실패한다),
# `resolver` + location 내부 변수 proxy_pass만으로 매 요청 재해석한다. `keepalive`는 정적 upstream 블록
# 전용 기능이라 이 방식과는 함께 쓰지 않는다(정적 upstream을 다시 쓰면 IP가 캐시되어 라운드로빈이 깨진다).
# Docker 임베디드 DNS — `backend` 서비스명을 매 요청마다 재해석해 3 replica IP를 순환한다.
resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    server_name _;

    # 컨테이너 healthcheck 전용 — 업스트림을 타지 않고 즉시 200 응답
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # 앱 전체를 프록시 — mcp.conf처럼 경로별 rate-limit/SSE 분기를 두지 않는다(LB는 전체 트래픽 앞단).
    location / {
        # 변수 proxy_pass — 매 요청마다 resolver로 `backend`를 재해석해 3 replica에 라운드로빈.
        set $pool backend;
        proxy_pass http://$pool:8080;
        proxy_http_version 1.1;

        # 비정상 replica 우회 — 헬스체크로 걸러지지 않은 순간의 개별 요청 실패에 대한 안전망.
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 3;

        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
