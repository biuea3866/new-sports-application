# MCP endpoint nginx config
# Exposed domain: mcp-api.sportsapp.com (placeholder)
# DevOps Open Issue #B (2026-05-27) 결정 후 server_name / upstream 환경변수 조정.

# ------------------------------------------------------------------
# rate limit zones
# ------------------------------------------------------------------
# IP 기반: 100 req/min (anonymous 또는 토큰 없는 요청)
limit_req_zone $binary_remote_addr zone=mcp_ip:10m rate=100r/m;

# 토큰 기반: 600 req/min (Authorization 헤더 보유 — 인증된 MCP 클라이언트)
# $http_authorization 값이 없으면 $binary_remote_addr 으로 fallback
map $http_authorization $mcp_rate_key {
    ""      $binary_remote_addr;
    default $http_authorization;
}
limit_req_zone $mcp_rate_key zone=mcp_token:20m rate=600r/m;

# ------------------------------------------------------------------
# upstream
# ------------------------------------------------------------------
upstream sports_backend {
    server 127.0.0.1:8080;
    keepalive 64;
}

# ------------------------------------------------------------------
# HTTP → HTTPS redirect
# ------------------------------------------------------------------
server {
    listen 80;
    server_name mcp-api.sportsapp.com;  # placeholder: DevOps 결정 후 변경

    return 301 https://$host$request_uri;
}

# ------------------------------------------------------------------
# HTTPS main server
# ------------------------------------------------------------------
server {
    listen 443 ssl;
    http2 on;
    server_name mcp-api.sportsapp.com;  # placeholder: DevOps 결정 후 변경

    # TLS (placeholder — DevOps 결정 후 실제 cert 경로로 변경)
    ssl_certificate     /etc/ssl/certs/mcp-api.sportsapp.com.crt;
    ssl_certificate_key /etc/ssl/private/mcp-api.sportsapp.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (1년, includeSubDomains)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 공통 보안 헤더
    add_header X-Content-Type-Options    "nosniff"    always;
    add_header X-Frame-Options           "DENY"       always;
    add_header Referrer-Policy           "no-referrer" always;

    # access log — JSON 포맷 (Datadog 연동, INFRA-03 메트릭과 일관)
    # PII: user_id / token_id 는 로그에 포함, 개인식별정보(이름·이메일)는 nginx 레벨에서 기록하지 않음
    access_log /var/log/nginx/mcp-access.log json_mcp;
    error_log  /var/log/nginx/mcp-error.log  warn;

    # ------------------------------------------------------------------
    # /mcp/sse — SSE 장기 연결 (Spring AI MCP Server SSE endpoint)
    # ------------------------------------------------------------------
    location = /mcp/sse {
        # rate limit (토큰 기반 zone 우선)
        limit_req zone=mcp_token burst=20 nodelay;
        limit_req zone=mcp_ip   burst=10 nodelay;

        proxy_pass         http://sports_backend;
        proxy_http_version 1.1;

        # SSE 핵심 설정
        proxy_read_timeout     3600s;  # 1시간 — SSE 장기 연결 유지
        proxy_send_timeout     3600s;
        proxy_connect_timeout  10s;

        # 버퍼링 완전 해제 (SSE 실시간 flush 필수)
        proxy_buffering        off;
        proxy_cache            off;
        proxy_request_buffering off;

        # SSE 헤더
        proxy_set_header Connection    "";
        add_header Cache-Control       "no-cache"      always;
        add_header X-Accel-Buffering   "no"            always;

        # keep-alive upstream 유지
        proxy_set_header Connection "";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------
    # /mcp/message — MCP JSON-RPC POST (일반 timeout)
    # ------------------------------------------------------------------
    location = /mcp/message {
        limit_req zone=mcp_token burst=50 nodelay;
        limit_req zone=mcp_ip   burst=20 nodelay;

        proxy_pass         http://sports_backend;
        proxy_http_version 1.1;

        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
        proxy_connect_timeout 10s;

        # 일반 POST — 버퍼링 기본값 유지 (성능)
        proxy_buffering on;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # gzip 응답 압축
        gzip            on;
        gzip_types      application/json;
        gzip_min_length 256;
    }

    # ------------------------------------------------------------------
    # /api/admin/mcp/** — Admin API (30s timeout, ADMIN role 강제는 Spring Security)
    # ------------------------------------------------------------------
    location /api/admin/mcp/ {
        # Admin API — IP 기반 rate limit (더 엄격)
        limit_req zone=mcp_ip burst=30 nodelay;

        proxy_pass         http://sports_backend;
        proxy_http_version 1.1;

        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
        proxy_connect_timeout 10s;

        proxy_buffering on;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------
    # 그 외 /mcp/** — 위 location에 매칭되지 않은 경우 (안전망)
    # ------------------------------------------------------------------
    location /mcp/ {
        limit_req zone=mcp_token burst=20 nodelay;
        limit_req zone=mcp_ip   burst=10 nodelay;

        proxy_pass         http://sports_backend;
        proxy_http_version 1.1;

        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
        proxy_connect_timeout 10s;

        proxy_buffering on;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------------------------------------------------------------------
    # 직접 접근 차단 (정의된 path 외)
    # ------------------------------------------------------------------
    location / {
        return 404;
    }
}

# ------------------------------------------------------------------
# JSON log format 정의 (http block 에 포함해야 하므로, 실제 적용 시
# /etc/nginx/nginx.conf 의 http {} 블록 내부에 아래 log_format 을 추가한다)
# ------------------------------------------------------------------
# log_format json_mcp escape=json
#   '{'
#     '"time":"$time_iso8601",'
#     '"remote_addr":"$remote_addr",'
#     '"method":"$request_method",'
#     '"uri":"$request_uri",'
#     '"status":$status,'
#     '"body_bytes":$body_bytes_sent,'
#     '"request_time":$request_time,'
#     '"upstream_time":"$upstream_response_time",'
#     '"http_authorization_prefix":"${http_authorization:0:20}",'
#     '"http_x_mcp_token_id":"$http_x_mcp_token_id",'
#     '"http_x_user_id":"$http_x_user_id",'
#     '"http_x_tool_name":"$http_x_tool_name"'
#   '}';
