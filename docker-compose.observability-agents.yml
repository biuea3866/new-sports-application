# 관측 에이전트 override — base(docker-compose.yml)에 얹는다.
# 실행: docker compose -f docker-compose.yml -f docker-compose.observability-agents.yml up -d
#
# 소유: INFRA-01 (옵저버빌리티 스택). 근거 TDD "시스템 역할 경계"·ADR-004(개정).
# 데이터스토어(mysql/mongodb/redis/kafka)는 base(docker-compose.yml)가 단독 소유한다 —
#   이 파일은 절대 재정의하지 않고, base가 띄운 서비스에 서비스명으로 접속하는 관측 에이전트만 정의한다.
# 네트워크: base에 별도 networks 블록이 없어 compose 프로젝트 default 네트워크를 쓴다.
#   따라서 이 파일도 커스텀 network를 정의하지 않는다 — 그래야 -f 병합 시 default 네트워크에서
#   exporter가 mysql/redis/kafka 서비스명으로 접속한다. (커스텀 network 정의 시 격리되어 접속 불가.)
# MongoDB exporter는 정의하지 않는다 (PRD Non-Goals — MongoDB 메트릭 범위 외).
#
# 롤백: docker compose -f docker-compose.observability-agents.yml down
#   — 데이터스토어·앱 무영향(scrape 대상 exporter만 사라짐).
services:
  # MySQL exporter — base `mysql`(3306) 접속. DSN 방식은 v0.14 계열에서 지원(v0.15+ 제거) → 태그 고정.
  mysqld-exporter:
    image: prom/mysqld-exporter:v0.14.0
    environment:
      DATA_SOURCE_NAME: "root:${MYSQL_ROOT_PASSWORD:-root}@(mysql:3306)/"
    ports:
      - "9104:9104"
    # base가 mysql healthcheck를 정의함 — 여기선 참조만(재정의 금지). base보다 먼저 떠서 접속 실패로 재시작하는 소음 방지.
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9104/metrics"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Redis exporter — base `redis`(6379) 접속. alpine 태그 사용(healthcheck용 wget 포함).
  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0-alpine
    environment:
      REDIS_ADDR: "redis://redis:6379"
    ports:
      - "9121:9121"
    # base가 redis healthcheck를 정의함 — 여기선 참조만(재정의 금지). base보다 먼저 떠서 접속 실패로 재시작하는 소음 방지.
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9121/metrics"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Kafka exporter — base `kafka`(9092) 브로커 접속.
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    command:
      - "--kafka.server=kafka:9092"
    ports:
      - "9308:9308"
    # base가 kafka healthcheck를 정의함 — 여기선 참조만(재정의 금지). base보다 먼저 떠서 접속 실패로 재시작하는 소음 방지.
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9308/metrics"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Kafka UI — base `kafka`(9092) 브로커·컨슈머그룹 조회 (FR-6). 관측용 호스트 포트 8089.
  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    environment:
      KAFKA_CLUSTERS_0_NAME: sports
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8089:8080"
    # base가 kafka healthcheck를 정의함 — 여기선 참조만(재정의 금지). base보다 먼저 떠서 접속 실패로 재시작하는 소음 방지.
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
