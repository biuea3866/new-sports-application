name: prod 배포 (QA 게이트 + 롤백)

# 근거: TDD.md "QA 게이트 연동 지점"(FR-4/FR-7), "실패 경로·동시성·멱등", "상태 전이 표",
#       "인터페이스 시그니처 — 배포/롤백 스크립트 계약". ADR-003(prod 배포 QA 게이트),
#       ADR-004(롤백 이미지 태그 핀). 티켓: INFRA-08.
# deploy-dev.yml(INFRA-07)과는 별개 파일 — 같은 wave 병렬 작업 대상.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: >-
          배포/롤백 대상 이미지 태그(커밋 SHA). 미지정 시 main HEAD(github.sha)로 신규 배포,
          지정 시 해당 태그로 롤백 배포한다(ADR-004).
        required: false
        default: ""
        type: string

# 같은 prod 스택으로의 중복 배포·롤백을 직렬화한다 (TDD "실패 경로·동시성·멱등" — 동시 배포 행).
# cancel-in-progress: false — 진행 중인 배포/롤백을 취소하지 않고 대기열로 순서를 보장한다.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  qa-gate:
    name: QA 게이트 검증
    # dev/prod 스택과 qa/verdict.json이 함께 있는 단일 호스트에서 실행한다.
    runs-on: [self-hosted]
    outputs:
      target_sha: ${{ steps.resolve-target.outputs.target_sha }}
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          # clean:false — self-hosted 기본 체크아웃(git clean -ffdx)은 gitignore 대상인
          # qa/verdict.json(private-qa가 워크스페이스에 직접 기록, git 미추적)을 삭제한다.
          # 워크플로 정의 파일은 최신으로 갱신하되 verdict 산출물은 보존한다.
          clean: false

      - name: 배포 대상 SHA 결정
        id: resolve-target
        run: |
          set -euo pipefail
          IMAGE_TAG_INPUT="${{ inputs.image_tag }}"
          if [[ -n "$IMAGE_TAG_INPUT" ]]; then
            echo "롤백 경로: image_tag 입력=${IMAGE_TAG_INPUT}"
            echo "target_sha=${IMAGE_TAG_INPUT}" >> "$GITHUB_OUTPUT"
          else
            echo "신규 배포 경로: main HEAD=${{ github.sha }}"
            echo "target_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: verdict.json 3중 검증 (status/commit/형식 — NFR 0-bypass)
        id: verify-verdict
        run: |
          set -euo pipefail

          VERDICT_FILE="qa/verdict.json"
          TARGET_SHA="${{ steps.resolve-target.outputs.target_sha }}"

          {
            echo "## QA 게이트 결과"
            echo ""
            echo "- 배포 대상 SHA: \`${TARGET_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          # ③ 파일 존재 검증
          if [[ ! -f "$VERDICT_FILE" ]]; then
            echo "::error::qa-gate: verdict 파일 없음 (${VERDICT_FILE})"
            echo "- 결과: **FAIL** — verdict 파일 부재" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          # ③ JSON 형식 검증
          if ! jq empty "$VERDICT_FILE" >/dev/null 2>&1; then
            echo "::error::qa-gate: verdict 파일 JSON 형식 오류"
            {
              echo "- 결과: **FAIL** — verdict 파일 JSON 파싱 실패"
              echo ""
              echo '```'
              cat "$VERDICT_FILE"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          VERDICT_STATUS="$(jq -r '.status // empty' "$VERDICT_FILE")"
          VERDICT_COMMIT="$(jq -r '.commit // empty' "$VERDICT_FILE")"
          VERDICT_REPORT_URL="$(jq -r '.reportUrl // "(없음)"' "$VERDICT_FILE")"
          VERDICT_RAN_AT="$(jq -r '.ranAt // "(없음)"' "$VERDICT_FILE")"

          {
            echo "- verdict status: \`${VERDICT_STATUS:-(없음)}\`"
            echo "- verdict commit: \`${VERDICT_COMMIT:-(없음)}\`"
            echo "- report URL: ${VERDICT_REPORT_URL}"
            echo "- 실행 시각: ${VERDICT_RAN_AT}"
            echo ""
            echo "<details><summary>verdict.json 원문 (FR-7)</summary>"
            echo ""
            echo '```json'
            cat "$VERDICT_FILE"
            echo '```'
            echo "</details>"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          # ① status == PASS
          if [[ "$VERDICT_STATUS" != "PASS" ]]; then
            echo "::error::qa-gate: verdict status가 PASS가 아님 (status=${VERDICT_STATUS:-없음})"
            echo "- **결과: FAIL — status != PASS**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          # ② commit == 배포 대상 SHA (stale PASS 차단)
          if [[ "$VERDICT_COMMIT" != "$TARGET_SHA" ]]; then
            echo "::error::qa-gate: verdict commit(${VERDICT_COMMIT:-없음})이 배포 대상 SHA(${TARGET_SHA})와 불일치 — stale PASS 차단"
            echo "- **결과: FAIL — commit 불일치(stale PASS 차단)**" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "- **결과: PASS**" >> "$GITHUB_STEP_SUMMARY"
          echo "qa-gate PASS: status=PASS, commit=${TARGET_SHA} 일치"

      - name: verdict 아티팩트 업로드 (FR-7)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-verdict-${{ github.run_id }}
          path: qa/verdict.json
          retention-days: 90
          if-no-files-found: warn

      - name: 게이트 차단 통지
        if: failure()
        # ⑩ 지능형 장애 알림 연동 지점 (source=deployment) — TDD "실패 경로·동시성·멱등" 표.
        # 알림 채널(Slack 등) 확정 전까지는 자리 표시(echo)만 수행한다.
        run: |
          echo "source=deployment env=prod stage=qa-gate sha=${{ steps.resolve-target.outputs.target_sha }} run_id=${{ github.run_id }} status=BLOCKED"

  deploy:
    name: prod 배포
    needs: qa-gate
    # 필수 승인 보호 규칙 연동 지점 — 이 키만으로는 승인이 강제되지 않는다.
    # 레포 Settings > Environments > production 에서 Required reviewers를 별도 설정해야
    # ADR-003 "자동(qa-gate)+수동(environment 승인) 2중 관문"이 완성된다.
    environment: production
    # dev/prod 스택이 함께 도는 단일 호스트에서 실행 (TDD Component Diagram: "단일 호스트(self-hosted runner)").
    runs-on: [self-hosted]
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          # clean:false — .env.prod(DOCKER_TAG 보유, gitignore 대상)가 기본 체크아웃의
          # git clean -ffdx로 삭제되는 것을 방지한다. 삭제되면 deploy.sh가
          # "env file not found"로 실패하고, 롤백에 필요한 이전 태그 정보도 함께 유실된다.
          clean: false

      - name: 이전 배포 태그 확인 (롤백 대비)
        id: previous-tag
        run: |
          set -euo pipefail
          PREVIOUS_TAG="$(grep '^DOCKER_TAG=' .env.prod | cut -d= -f2- || true)"
          echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"
          echo "이전 DOCKER_TAG=${PREVIOUS_TAG:-(없음)}"

      - name: 백엔드 이미지 빌드 (신규 배포 경로에만 — 롤백은 기존 태그 이미지를 재사용)
        if: ${{ inputs.image_tag == '' }}
        run: |
          docker build \
            -t sports-backend:${{ needs.qa-gate.outputs.target_sha }} \
            backend/

      - name: prod 배포 (scripts/deploy.sh)
        # deploy.sh가 .env.prod의 DOCKER_TAG를 target_sha로 치환 → docker compose up -d →
        # /actuator/health 폴링(최대 5분). 실패 시 exit 1로 이 스텝이 실패한다.
        run: scripts/deploy.sh prod ${{ needs.qa-gate.outputs.target_sha }}

      - name: 배포 실패 → 자동 롤백 (ADR-004)
        if: failure()
        run: |
          set -euo pipefail
          PREVIOUS_TAG="${{ steps.previous-tag.outputs.previous_tag }}"
          if [[ -z "$PREVIOUS_TAG" ]]; then
            echo "::warning::이전 배포 태그가 없어 롤백을 건너뜁니다 (최초 배포 실패로 추정)"
          else
            scripts/rollback.sh prod "$PREVIOUS_TAG"
          fi

      - name: 배포 실패 통지
        if: failure()
        # ⑩ 지능형 장애 알림 연동 지점 (source=deployment) — TDD "실패 경로·동시성·멱등" 표.
        # 알림 채널(Slack 등) 확정 전까지는 자리 표시(echo)만 수행한다.
        run: |
          echo "source=deployment env=prod stage=deploy sha=${{ needs.qa-gate.outputs.target_sha }} run_id=${{ github.run_id }} status=FAILED"
