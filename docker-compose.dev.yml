# dev 환경 override — base(docker-compose.yml)에 얹는다.
# 실행: docker compose -p sports-dev -f docker-compose.yml -f docker-compose.dev.yml --env-file .env.dev up -d
#
# 소유: ⑧ 배포 파이프라인·환경 분리 (INFRA-05). base 서비스명·내부 포트는 INFRA-02 계약을 그대로 따른다.
# 이 파일은 dev 전용 값(호스트 포트 노출, APP_ENV=dev)만 부여한다 — 서비스 신규 정의 금지(오타 시 신규 서비스 생성됨).
#
# 롤백: 이 파일을 revert. dev는 sports-prod와 프로젝트명(-p)으로 네임스페이스 분리되어 있어 상호 무영향.
services:
  backend:
    environment:
      APP_ENV: dev
      # base의 DB_PASSWORD 기본값은 빈 문자열이라, 셸에서 export하지 않으면 backend가
      # 빈 비밀번호로 접속을 시도해 부팅에 실패한다(= 컨테이너가 한 번 죽으면 되살릴 수 없다).
      # mysql의 MYSQL_ROOT_PASSWORD 기본값(root)과 같은 값을 dev에 고정해 재현 가능하게 만든다.
      DB_PASSWORD: root
      # SMTP는 mailhog 컨테이너에 있다. application.yml의 MAIL_HOST 기본값이 localhost라
      # 주입하지 않으면 backend 컨테이너가 자기 자신의 1025 포트를 찾다 실패한다
      # (health가 DOWN이 되고 메일 발송도 안 된다).
      MAIL_HOST: mailhog
      # dev는 기능 전체를 켠 상태로 검증한다. 이 플래그들이 OFF면 @ConditionalOnProperty가
      # 컨트롤러 빈 자체를 등록하지 않아 해당 경로가 통째로 404가 된다
      # (동아리 개설·조회 /communities, 소모임 예약 /communities/{id}/bookings).
      # 롤백: 아래 두 줄을 지우면 즉시 이전 동작(404)으로 돌아간다.
      CHAT_COMMUNITY_ENABLED: "true"
      COMMUNITY_BOOKING_ENABLED: "true"
      # 외부 연동 base-url. application.yml 기본값이 localhost:<호스트포트>라 주입하지 않으면
      # backend 컨테이너가 자기 자신을 호출해 전부 Connection refused 가 된다
      # (날씨·대기질이 빈 응답으로 보이던 원인). mock 은 별도 컨테이너이므로
      # 서비스명 + 컨테이너 내부 포트로 지정한다.
      EXTERNAL_GEOCODING_BASE_URL: http://mock-kakao-local:8080
      EXTERNAL_PUBLIC_FACILITY_BASE_URL: http://mock-data-go-kr:8080
      EXTERNAL_WEATHER_BASE_URL: http://mock-data-go-kr:8080
      EXTERNAL_AIR_QUALITY_BASE_URL: http://mock-data-go-kr:8080
      EXTERNAL_SMS_BASE_URL: http://mock-solapi:8080
      PG_MOCK_BASE_URL: http://mock-pg:9090
      # 가상 대기열 토큰 서명 키. 비어 있으면 HmacEntryTokenGateway 가 부팅을 실패시킨다
      # (약한 기본값으로 오배포되는 것을 막는 의도된 설계). base compose 가 이 값을 backend 로
      # 넘기지 않아 dev 부팅이 불가능했다. dev 전용 값이며 prod 는 별도 시크릿을 주입해야 한다.
      VIRTUAL_QUEUE_TOKEN_SECRET: dev-local-virtual-queue-token-secret-not-for-prod
    ports:
      - "8080:8080"

  mysql:
    ports:
      - "3306:3306"

  mongodb:
    ports:
      - "27017:27017"

  redis:
    ports:
      - "6379:6379"

  kafka:
    ports:
      - "9092:9092"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"

  mock-pg:
    ports:
      - "9090:9090"

  mock-kakao-local:
    ports:
      - "9101:8080"

  mock-data-go-kr:
    ports:
      - "9102:8080"

  mock-solapi:
    ports:
      - "9103:8080"

  mailhog:
    ports:
      - "1025:1025"
      - "8025:8025"
