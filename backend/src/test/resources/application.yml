mcp:
  external-url: http://localhost:8080

spring:
  ai:
    mcp:
      server:
        enabled: true
        name: sports-mcp-server-test
        version: 1.0.0
        sse-endpoint: /mcp/sse
        sse-message-endpoint: /mcp/message
  main:
    allow-bean-definition-overriding: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: sports-app-test
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "com.sportsapp.*"
    producer:
      acks: all
    listener:
      auto-startup: false
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/sports}
      auto-index-creation: true
      repositories:
        type: auto
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/sports?serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        # BE-12: 방목록 미리보기 findMyRoomViews 의 N+1 회피를 prepareStatementCount 델타로
        # 검증하기 위해 테스트 프로파일에서만 통계 수집을 켠다.
        generate_statistics: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  batch:
    jdbc:
      # BE-11: src/test/resources/application.yml 은 클래스패스 application.yml 을 완전히 대체한다
      # (src/main 값이 테스트에 병합되지 않음, 실측 확인) — main과 동일하게 idempotent 초기화 사용.
      initialize-schema: never
    job:
      # BE-11: 테스트에서도 부팅 시 자동 실행 금지. 값이 없으면(matchIfMissing=true)
      # JobLauncherApplicationRunner 가 빈 파라미터로 전체 Job을 자동 실행해 테스트를 오염시킨다
      # (실측 확인 — Job: [...] launched with the following parameters: [{}]).
      enabled: false
  mail:
    host: localhost
    port: 1025

partner:
  auth:
    # 테스트 기본값은 true — Partner 관련 통합/시나리오 테스트가 별도 오버라이드 없이
    # 필터 동작을 검증할 수 있게 한다. 비활성 시나리오는 @TestPropertySource로 개별 오버라이드.
    enabled: true

chat:
  realtime:
    # 테스트 기본값은 true — BE-04 STOMP 통합 테스트가 별도 오버라이드 없이 동작하게 한다.
    # 비활성 시나리오(ChatRealtimeDisabledTest)는 @TestPropertySource로 개별 오버라이드.
    enabled: true

facility:
  program:
    # 테스트 기본값은 true — BE-59 program 통합/시나리오 테스트가 별도 오버라이드 없이 동작하게 한다.
    # 비활성 시나리오(ProgramApiControllerFeatureFlagDisabledTest)는 @TestPropertySource로 개별 오버라이드.
    enabled: true

storage:
  image:
    endpoint: http://localhost:9000
    region: us-east-1
    access-key: minioadmin
    secret-key: minioadmin
    bucket: sports-app
    upload-expiry-seconds: 900
    download-expiry-seconds: 3600
    max-bytes: 10485760
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp

notification:
  templates:
    payment-completed:
      title: "결제 완료"
      body: "{amount}원 결제가 완료되었습니다."
    welcome:
      title: "가입 완료"
      body: "{userName}님, 스포츠 앱에 오신 것을 환영합니다."

limited-drop:
  enabled: true
  redis-gate:
    enabled: true

app:
  jwt:
    secret: test-secret-key-for-integration-tests-that-is-at-least-32-chars-long
  limited-drop:
    reservation:
      semaphore-permits: 200
      acquire-timeout-millis: 200
      marker-ttl-seconds: 600

management:
  health:
    defaults:
      enabled: false
    mongo:
      enabled: false
    redis:
      enabled: false
    db:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.data.repository.config: DEBUG
    org.springframework.cache: TRACE
