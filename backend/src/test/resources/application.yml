spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/sports}
      auto-index-creation: true
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/sports?serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  health:
    mongo:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
