server:
  port: 8080
  tomcat:
    # SSE 동시 연결 대응: 기본 200 스레드로는 장기 연결 소진 위험
    # SSE 는 비동기(DeferredResult/WebFlux) 구현 시 스레드를 점유하지 않으나,
    # 동기 서블릿 SSE(SseEmitter) 사용 시 연결 1개당 스레드 1개 소비.
    # 운영 환경에서는 MCP_TOMCAT_MAX_THREADS 로 override.
    threads:
      max: ${MCP_TOMCAT_MAX_THREADS:400}
      min-spare: ${MCP_TOMCAT_MIN_SPARE_THREADS:20}
    max-connections: ${MCP_TOMCAT_MAX_CONNECTIONS:8192}
    accept-count: ${MCP_TOMCAT_ACCEPT_COUNT:100}
    connection-timeout: ${MCP_TOMCAT_CONNECTION_TIMEOUT:20000}

mcp:
  # 외부 노출 URL placeholder — DevOps Open Issue #B 결정 후 환경변수로 변경
  # 예: MCP_EXTERNAL_URL=https://mcp-api.sportsapp.com
  external-url: ${MCP_EXTERNAL_URL:https://mcp-api.sportsapp.com}

spring:
  ai:
    mcp:
      server:
        enabled: true
        name: sports-mcp-server
        version: 1.0.0
        sse-endpoint: /mcp/sse
        sse-message-endpoint: /mcp/message
  application:
    name: sports-application
  config:
    use-legacy-processing: false
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/sports}
      repositories:
        type: auto
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/sports?serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:sports-app}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.sportsapp.*"
    producer:
      acks: all
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

notification:
  templates:
    payment-completed:
      title: "결제 완료"
      body: "{amount}원 결제가 완료되었습니다."
    booking-confirmed:
      title: "예약 확정"
      body: "{facilityName} 예약이 확정되었습니다."
    welcome:
      title: "가입 완료"
      body: "{userName}님, 스포츠 앱에 오신 것을 환영합니다."

app:
  payment:
    mock:
      success-rate: 1.0
    pg:
      mock-base-url: ${PG_MOCK_BASE_URL:http://localhost:9090}
  jwt:
    secret: ${APP_JWT_SECRET}
  notifications:
    templates:
      payment-completed:
        title: "결제 완료"
        body: "결제 {amount}원이 완료되었습니다"
      booking-confirmed:
        title: "예약 확정"
        body: "{facility} 예약이 확정되었습니다"
      ticket-issued:
        title: "발권 완료"
        body: "{eventTitle} 티켓 발권이 완료되었습니다"

storage:
  image:
    endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
    region: ${STORAGE_REGION:us-east-1}
    access-key: ${STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${STORAGE_SECRET_KEY:minioadmin}
    bucket: ${STORAGE_BUCKET:sports-app}
    upload-expiry-seconds: ${STORAGE_UPLOAD_EXPIRY_SECONDS:900}
    download-expiry-seconds: ${STORAGE_DOWNLOAD_EXPIRY_SECONDS:3600}
    max-bytes: ${STORAGE_MAX_BYTES:10485760}
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp

# 외부 Open API — 키가 있으면 실 host, 없으면 docker-compose mock host(localhost:910x).
external:
  geocoding:
    base-url: ${EXTERNAL_GEOCODING_BASE_URL:http://localhost:9101}
    api-key: ${KAKAO_REST_API_KEY:}
  public-facility:
    base-url: ${EXTERNAL_PUBLIC_FACILITY_BASE_URL:http://localhost:9102}
    api-key: ${DATA_GO_KR_SERVICE_KEY:mock-service-key}
  weather:
    base-url: ${EXTERNAL_WEATHER_BASE_URL:http://localhost:9102}
    api-key: ${DATA_GO_KR_SERVICE_KEY:mock-service-key}
  push:
    base-url: ${EXTERNAL_PUSH_BASE_URL:https://exp.host}
    api-key: ${EXPO_ACCESS_TOKEN:}
  sms:
    base-url: ${EXTERNAL_SMS_BASE_URL:http://localhost:9103}
    api-key: ${SOLAPI_API_KEY:mock-api-key}
    from: ${SMS_SENDER_NUMBER:0700000000}
  email:
    from: ${MAIL_FROM:no-reply@sportsapp.local}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      datadog:
        enabled: ${DATADOG_ENABLED:false}
        api-key: ${DATADOG_API_KEY:}
        application-key: ${DATADOG_APPLICATION_KEY:}
        uri: ${DATADOG_URI:https://api.datadoghq.com}
        step: 60s
    tags:
      application: ${spring.application.name}
      env: ${APP_ENV:local}
      service: mcp
