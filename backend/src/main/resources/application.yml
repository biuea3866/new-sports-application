server:
  port: 8080

spring:
  application:
    name: sports-application
  config:
    use-legacy-processing: false
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/sports}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/sports?serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:sports-app}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.sportsapp.*"
    producer:
      acks: all

notification:
  templates:
    payment-completed:
      title: "결제 완료"
      body: "{amount}원 결제가 완료되었습니다."
    booking-confirmed:
      title: "예약 확정"
      body: "{facilityName} 예약이 확정되었습니다."
    welcome:
      title: "가입 완료"
      body: "{userName}님, 스포츠 앱에 오신 것을 환영합니다."

app:
  payment:
    mock:
      success-rate: 1.0
  jwt:
    secret: ${APP_JWT_SECRET}
  notifications:
    templates:
      payment-completed:
        title: "결제 완료"
        body: "결제 {amount}원이 완료되었습니다"
      booking-confirmed:
        title: "예약 확정"
        body: "{facility} 예약이 확정되었습니다"
      ticket-issued:
        title: "발권 완료"
        body: "{eventTitle} 티켓 발권이 완료되었습니다"

storage:
  image:
    endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
    region: ${STORAGE_REGION:us-east-1}
    access-key: ${STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${STORAGE_SECRET_KEY:minioadmin}
    bucket: ${STORAGE_BUCKET:sports-app}
    upload-expiry-seconds: ${STORAGE_UPLOAD_EXPIRY_SECONDS:900}
    download-expiry-seconds: ${STORAGE_DOWNLOAD_EXPIRY_SECONDS:3600}
    max-bytes: ${STORAGE_MAX_BYTES:10485760}
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp

spring:
  ai:
    mcp:
      server:
        enabled: true
        name: sports-mcp-server
        version: 1.0.0
        sse-endpoint: /mcp/sse
        sse-message-endpoint: /mcp/message

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      datadog:
        enabled: ${DATADOG_ENABLED:false}
        api-key: ${DATADOG_API_KEY:}
        application-key: ${DATADOG_APPLICATION_KEY:}
        uri: ${DATADOG_URI:https://api.datadoghq.com}
        step: 60s
    tags:
      application: ${spring.application.name}
      env: ${APP_ENV:local}
      service: mcp
