server:
  port: 8080
  tomcat:
    # SSE 동시 연결 대응: 기본 200 스레드로는 장기 연결 소진 위험
    # SSE 는 비동기(DeferredResult/WebFlux) 구현 시 스레드를 점유하지 않으나,
    # 동기 서블릿 SSE(SseEmitter) 사용 시 연결 1개당 스레드 1개 소비.
    # 운영 환경에서는 MCP_TOMCAT_MAX_THREADS 로 override.
    threads:
      max: ${MCP_TOMCAT_MAX_THREADS:400}
      min-spare: ${MCP_TOMCAT_MIN_SPARE_THREADS:20}
    max-connections: ${MCP_TOMCAT_MAX_CONNECTIONS:8192}
    accept-count: ${MCP_TOMCAT_ACCEPT_COUNT:100}
    connection-timeout: ${MCP_TOMCAT_CONNECTION_TIMEOUT:20000}

mcp:
  # 외부 노출 URL placeholder — DevOps Open Issue #B 결정 후 환경변수로 변경
  # 예: MCP_EXTERNAL_URL=https://mcp-api.sportsapp.com
  external-url: ${MCP_EXTERNAL_URL:https://mcp-api.sportsapp.com}

spring:
  ai:
    mcp:
      server:
        enabled: true
        name: sports-mcp-server
        version: 1.0.0
        sse-endpoint: /mcp/sse
        sse-message-endpoint: /mcp/message
  application:
    name: sports-application
  config:
    use-legacy-processing: false
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/sports}
      repositories:
        type: auto
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/sports?serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:sports-app}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.sportsapp.*"
    producer:
      acks: all
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

notification:
  templates:
    payment-completed:
      title: "결제 완료"
      body: "{amount}원 결제가 완료되었습니다."
    booking-confirmed:
      title: "예약 확정"
      body: "{facilityName} 예약이 확정되었습니다."
    welcome:
      title: "가입 완료"
      body: "{userName}님, 스포츠 앱에 오신 것을 환영합니다."

partner:
  auth:
    # B2B 파트너 API Key 인증 필터 게이트. expand-contract 배포: 코드 배포 시 false로 시작해
    # 관리 API로 테스트 파트너 등록·회귀 확인 후 PARTNER_AUTH_ENABLED=true로 전환한다.
    enabled: ${PARTNER_AUTH_ENABLED:false}

limited-drop:
  # Release Scenario 4단계 — 회차별 전체 활성 플래그. OFF면 LimitedDropApiController 빈 자체가
  # 등록되지 않아 전 엔드포인트가 404 (즉시 롤백 지점). 운영 기본값은 false — 코드 배포 후 회귀
  # 확인을 마친 뒤 LIMITED_DROP_ENABLED=true로 명시 전환한다(코드 리뷰 p1). 로컬 개발 편의는
  # dev 프로파일(application-dev.yml)에만 true로 override한다.
  enabled: ${LIMITED_DROP_ENABLED:false}
  redis-gate:
    # Release Scenario 5단계 — Redis 게이트 서브플래그. OFF 시 DB @Version + 세마포어 폴백(방안 B)으로
    # 전환한다(오버셀 0 유지, 처리량만 감소). 이 값 자체는 문서화 목적이며 폴백 구현은 후속 티켓 범위.
    enabled: ${LIMITED_DROP_REDIS_GATE_ENABLED:true}

app:
  payment:
    mock:
      success-rate: 1.0
    pg:
      mock-base-url: ${PG_MOCK_BASE_URL:http://localhost:9090}
  limited-drop:
    reservation:
      # DropReservationStoreImpl 인프로세스 세마포어(FR-7) — 단일 인스턴스 전제(TDD Open Questions).
      semaphore-permits: ${LIMITED_DROP_SEMAPHORE_PERMITS:200}
      acquire-timeout-millis: ${LIMITED_DROP_ACQUIRE_TIMEOUT_MILLIS:200}
      marker-ttl-seconds: ${LIMITED_DROP_MARKER_TTL_SECONDS:600}
  jwt:
    # 로컬 개발 기본값. 운영에서는 반드시 APP_JWT_SECRET 환경변수로 override 한다.
    secret: ${APP_JWT_SECRET:local-dev-only-jwt-secret-key-change-me-0123456789abcdef0123456789abcdef}
  notifications:
    templates:
      payment-completed:
        title: "결제 완료"
        body: "결제 {amount}원이 완료되었습니다"
      booking-confirmed:
        title: "예약 확정"
        body: "{facility} 예약이 확정되었습니다"
      ticket-issued:
        title: "발권 완료"
        body: "{eventTitle} 티켓 발권이 완료되었습니다"

storage:
  image:
    endpoint: ${STORAGE_ENDPOINT:http://localhost:9000}
    region: ${STORAGE_REGION:us-east-1}
    access-key: ${STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${STORAGE_SECRET_KEY:minioadmin}
    bucket: ${STORAGE_BUCKET:sports-app}
    upload-expiry-seconds: ${STORAGE_UPLOAD_EXPIRY_SECONDS:900}
    download-expiry-seconds: ${STORAGE_DOWNLOAD_EXPIRY_SECONDS:3600}
    max-bytes: ${STORAGE_MAX_BYTES:10485760}
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp

# 외부 Open API — 키가 있으면 실 host, 없으면 docker-compose mock host(localhost:910x).
external:
  geocoding:
    base-url: ${EXTERNAL_GEOCODING_BASE_URL:http://localhost:9101}
    api-key: ${KAKAO_REST_API_KEY:}
  public-facility:
    base-url: ${EXTERNAL_PUBLIC_FACILITY_BASE_URL:http://localhost:9102}
    api-key: ${DATA_GO_KR_SERVICE_KEY:mock-service-key}
  weather:
    base-url: ${EXTERNAL_WEATHER_BASE_URL:http://localhost:9102}
    api-key: ${DATA_GO_KR_SERVICE_KEY:mock-service-key}
  push:
    base-url: ${EXTERNAL_PUSH_BASE_URL:https://exp.host}
    api-key: ${EXPO_ACCESS_TOKEN:}
  sms:
    base-url: ${EXTERNAL_SMS_BASE_URL:http://localhost:9103}
    api-key: ${SOLAPI_API_KEY:mock-api-key}
    from: ${SMS_SENDER_NUMBER:0700000000}
  email:
    from: ${MAIL_FROM:no-reply@sportsapp.local}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
      env: ${APP_ENV:local}
      service: mcp
  tracing:
    sampling:
      # 100% 샘플링 (NFR) — trace 연결율 99%+ 목표, 개인 프로젝트 트래픽 규모라 비용 문제 없음
      probability: 1.0
  otlp:
    tracing:
      # MANAGEMENT_OTLP_TRACING_ENDPOINT 미주입 시 로컬 기본값으로 사실상 no-op(피처 플래그 등가) — Collector 준비 전에도 앱 정상 부팅
      # Spring Boot 3.3.5의 OTLP tracing은 HTTP 전용이므로 Collector HTTP 포트(4318) + /v1/traces 경로를 사용한다.
      # (transport 프로퍼티는 Spring Boot 3.4+에서만 유효 — 3.3.5에서는 바인딩되지 않는 죽은 설정이라 두지 않는다.)
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
  opentelemetry:
    resource-attributes:
      # env → deployment.environment 매핑 (ADR-005, 신규 라벨 키 미도입 — APP_ENV 단일 원천 재사용)
      deployment.environment: ${APP_ENV:local}
