# 관측 백엔드 스택 (LGTM + OTel Collector + Grafana + Promtail) — 과제 ⑤ 소유
#
# 근거: TDD "시스템 역할 경계", ADR-002(메트릭=Prometheus 직접 scrape / trace·log=Collector),
#       ADR-003(OTel Collector 단일 게이트웨이), ADR-004(compose 파일 분리).
#
# 소유 범위: 이 파일은 관측 "백엔드"(Collector·Prometheus·Tempo·Loki·Grafana·Promtail)만 정의한다.
#   - exporter 3종(mysqld/redis/kafka)·Kafka UI → docker-compose.observability-agents.yml (INFRA-01)
#   - 데이터스토어(mysql/mongodb/redis/kafka) → base docker-compose.yml (⑧ 단일 소유, 재정의 금지)
#   - config 파일 내용 → INFRA-03, Grafana provisioning/dashboards → INFRA-04 (경로만 참조)
#   - Promtail(컨테이너 stdout → Loki)은 ⑤ 후속 — 앱 OTLP 로그(Spring Boot 3.3.5 미지원)와
#     별개 경로로 컨테이너 로그 조회 공백을 해소한다. 상세는 observability/promtail/promtail-config.yaml.
#
# 네트워크: base compose가 별도 networks 블록 없이 default 네트워크를 쓰므로 이 파일도
#   커스텀 네트워크를 정의하지 않는다. 모든 서비스가 default 네트워크에 놓여 서비스명으로 통신한다
#   (backend→otel-collector, collector→tempo/loki/prometheus, grafana→prometheus/tempo/loki).
#
# 기동:   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
# 롤백:   docker compose -f docker-compose.observability.yml down   (앱·데이터스토어 무영향)

services:
  # ---- 앱 OTLP 배선 (environment만 병합 — base backend 서비스 재정의 아님) ----
  # base docker-compose.yml의 backend에 trace/log 발신 대상만 deep-merge로 얹는다.
  # image·depends_on·데이터스토어 env 등은 base가 소유하며 여기서 건드리지 않는다.
  backend:
    environment:
      # Spring Boot 3.3.5 OTLP tracing은 HTTP 전용 → Collector HTTP 포트(4318) + /v1/traces 경로.
      # (gRPC 포트 4317로 보내면 HTTP POST가 실패해 trace export가 끊긴다 — FR-2 연결율 99% 위협)
      MANAGEMENT_OTLP_TRACING_ENDPOINT: http://otel-collector:4318/v1/traces
      # OTEL SDK 공통 base 엔드포인트(로그 OTLP appender·향후 SDK autoconfig용, 경로 없는 base)
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      # 지능형 장애 알림 배포 게이트 선결 항목 후속 수정: observability 스택(Grafana 포함)이 함께
      # 뜰 때만 alerting.enabled=true로 켠다 — 이 스택 없이는 webhook 발신 경로(Grafana Alerting)
      # 자체가 존재하지 않으므로, base docker-compose.yml 단독 기동 시에는 계속 기본값 false(202만
      # 응답, 파이프라인 미트리거)를 유지한다(무중단·즉시 롤백 지점, Release Scenario 원칙 그대로).
      ALERTING_ENABLED: "true"
      # grafana-alerting-bootstrap(아래)이 등록하는 backend-webhook contact point와 동일한 시크릿을
      # 공유해야 한다 — 값 불일치 시 컨트롤러가 401로 드롭한다. 평문 커밋 금지, 반드시 셸 env로 주입.
      ALERT_WEBHOOK_TOKEN: ${ALERT_WEBHOOK_TOKEN:?ALERT_WEBHOOK_TOKEN 환경변수를 설정하세요 (observability 스택 기동 전 필수 — Grafana bootstrap과 backend가 동일 시크릿을 공유합니다)}

  # ---- OTel Collector — trace/log 게이트웨이 (ADR-003) ----
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      # config 내용은 INFRA-03 소유 — 경로만 계약으로 고정
      - ./observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC 수신
      - "4318:4318"   # OTLP HTTP 수신
      - "8888:8888"   # Collector self-metric (Prometheus가 scrape)
    restart: unless-stopped

  # ---- Prometheus — 메트릭 저장·scrape 오케스트레이션 (ADR-002) ----
  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"      # Collector remote_write 보조 경로 수신
      - "--enable-feature=exemplar-storage"        # exemplar 저장 (FR-11, metric→trace 점프)
    volumes:
      # scrape 잡 정의는 INFRA-03 소유 — 경로만 계약으로 고정
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ---- Tempo — trace 저장·조회 ----
  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      # config 내용은 INFRA-03 소유 — 경로만 계약으로 고정
      - ./observability/tempo/tempo-config.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo query API (Grafana 데이터소스)
    restart: unless-stopped

  # ---- Loki — 로그 저장·조회 ----
  loki:
    image: grafana/loki:3.1.0
    command: ["-config.file=/etc/loki/local-config.yaml"]
    volumes:
      # config 내용은 INFRA-03 소유 — 경로만 계약으로 고정
      - ./observability/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  # ---- Promtail — 컨테이너 stdout/stderr 로그 수집 → Loki (⑤ 후속) ----
  # 배경·롤백: observability/promtail/promtail-config.yaml 헤더 주석 참조.
  # docker.sock 마운트는 로컬/dev 전용 패턴 — prod에서는 호스트 보안 정책에 맞게 재검토가 필요하다.
  promtail:
    image: grafana/promtail:3.1.0
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./observability/promtail/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # positions 파일을 named volume에 저장 — 컨테이너 재기동 시 마지막 읽은 위치를 유지해
      # 로그 중복 수집을 방지한다(promtail-config.yaml positions.filename 참고).
      - promtail-positions:/data
    depends_on:
      loki:
        condition: service_started
    restart: unless-stopped

  # ---- Grafana — 시각화 (데이터소스·대시보드 프로비저닝) ----
  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      # provisioning(데이터소스·대시보드 provider)·dashboards json은 INFRA-04 소유 — 경로만 참조
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      # ⑦ 시뮬레이터 대시보드(qa/load/dashboards) — ⑦ 소유 파일을 읽기 전용으로 참조만 한다(복제 금지).
      # provider.yml의 "qa-load-simulator" provider가 이 경로를 스캔한다.
      - ./qa/load/dashboards:/var/lib/grafana/dashboards-simulator:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ---- Grafana Alerting webhook contact point 부트스트랩 (지능형 장애 알림 배포 게이트 선결 항목) ----
  # 배경: Grafana 11.1.0/11.4.0 모두 파일 프로비저닝(provisioning/alerting/contact-points.yaml)으로
  # 등록한 webhook contact point는 secureSettings(Authorization 헤더)가 저장은 되지만 실제 알림
  # 발송 시 누락된다(실측, 두 버전 공통 결함 — observability/grafana/bootstrap/register_webhook_contact_point.py
  # docstring 참고). 이 서비스가 Grafana 기동 후 Alertmanager 설정 API로 우회 등록한다.
  # 일회성 작업(Job)이라 restart 정책을 두지 않는다 — Grafana가 재기동돼도 이 컨테이너는 이미
  # 종료(exit 0)된 상태이며, 등록된 설정은 grafana-data 볼륨에 남아 있으므로 재실행이 불필요하다.
  # 재실행이 필요하면(예: ALERT_WEBHOOK_TOKEN 로테이션) `docker compose run --rm grafana-alerting-bootstrap`.
  grafana-alerting-bootstrap:
    image: python:3.12-alpine
    depends_on:
      grafana:
        condition: service_healthy
    volumes:
      - ./observability/grafana/bootstrap/register_webhook_contact_point.py:/register_webhook_contact_point.py:ro
    environment:
      GRAFANA_URL: http://grafana:3000
      GRAFANA_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GRAFANA_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      # backend 서비스(위)와 동일한 시크릿을 공유해야 한다 — 값 불일치 시 컨트롤러가 401로 드롭한다.
      ALERT_WEBHOOK_TOKEN: ${ALERT_WEBHOOK_TOKEN:?ALERT_WEBHOOK_TOKEN 환경변수를 설정하세요 (observability 스택 기동 전 필수 — Grafana bootstrap과 backend가 동일 시크릿을 공유합니다)}
      BACKEND_WEBHOOK_URL: http://backend:8080/internal/alerts/grafana
    command: ["python", "/register_webhook_contact_point.py"]
    restart: "no"

volumes:
  prometheus-data:
  tempo-data:
  loki-data:
  grafana-data:
  promtail-positions:
