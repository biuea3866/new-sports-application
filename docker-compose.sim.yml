# docker-compose.sim.yml — k6-runner + reseed + 제어 (⑦ 상시 트래픽 시뮬레이터 단독 소유, INFRA-09)
#
# 근거: TDD.md "서버 토폴로지 설계"·"compose 파일 소유 경계"(Single Writer)·ADR-004. INFRA-09.
# 소유: ⑦ 전용 파일 — base(docker-compose.yml, ⑧)·override(docker-compose.{dev,prod}.yml, ⑧)·
#       observability(docker-compose.observability*.yml, ⑤)·LB(docker-compose.lb.yml, ⑦-INFRA-02)는
#       이 파일에서 재정의하지 않는다. 앱·mock·데이터스토어를 정의하지 않는다.
#       TDD "형제 과제 접점": "⑦는 ⑤ 파일 무수정(대시보드 JSON을 산출물로 전달, 조율)" —
#       observability.yml의 grafana/prometheus 서비스는 여기서도 확장(override)하지 않는다
#       (이 파일은 docker-compose.observability.yml 없이도 base+lb 위에서 단독으로 유효해야
#       하고 — 실제로 이 조합이 완료 테스트 케이스다 — grafana/prometheus를 참조·확장하면
#       observability.yml 미병합 시 "서비스 미정의" 오류로 config가 깨진다).
#
# 무엇을: 부하 발생기(k6-runner, INFRA-04~07 시나리오 4종을 병렬 프로세스로 실행)와
#         reseed 배치(INFRA-08, 10분 주기 synthetic 복원)를 관측 대상과 격리된 별도
#         컨테이너로 추가한다. 상태 조회는 k6 Prometheus remote-write(--out
#         experimental-prometheus-rw) → ⑤ Prometheus(docker-compose.observability.yml이
#         이미 --web.enable-remote-write-receiver로 수신 활성화되어 있어 추가 조율 불요) →
#         ⑤ Grafana. 대시보드 JSON은 `qa/load/dashboards/simulator.json`으로 산출물 전달
#         만 하고(FR-6), ⑤ provisioning 배선(observability/grafana/dashboards/로 복사 또는
#         provider 추가)은 ⑤ 파일을 건드리지 않기 위해 이 compose가 아닌 별도 조율 사항으로
#         남긴다(README "상태 조회" 절 참고 — Open Item).
#
# 네트워크: base가 커스텀 networks를 정의하지 않으므로(default 네트워크) 이 파일도
#   커스텀 network를 정의하지 않는다 — k6-runner/reseed가 서비스명(nginx-lb·prometheus·
#   mysql·redis)으로 접속하려면 반드시 같은 default 네트워크에 있어야 한다.
#
# 병합 예(prod + LB + 관측 + 시뮬 — TDD "compose 파일 소유 경계", 실사용 조합):
#   docker compose -p sports-prod \
#     -f docker-compose.yml -f docker-compose.prod.yml \
#     -f docker-compose.observability.yml \
#     -f docker-compose.lb.yml -f docker-compose.sim.yml up -d
#
# 최소 병합(관측 스택 없이 sim.yml 구조 자체 검증 — 완료 기준 테스트 케이스):
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml \
#     -f docker-compose.lb.yml -f docker-compose.sim.yml config
#   (이 조합에서는 K6_PROMETHEUS_RW_SERVER_URL이 가리키는 prometheus가 없어 k6 remote-write는
#    연결 실패 워닝만 내고 계속 진행한다 — config 구조 자체는 관측 스택 유무와 무관하게 유효해야 한다)
#
# 롤백: `-f docker-compose.sim.yml`을 병합 명령에서 제거(오버레이 OFF)하면 k6-runner·reseed
#       정의 자체가 사라져 다음 병합 기동부터 뜨지 않는다. 대상 앱(backend·LB·관측)은 무영향.
#       즉시 중단은 `make sim-down`(graceful ramp-to-0 후 k6-runner·reseed만 stop, 나머지 스택 유지).
services:
  # ---- k6-runner: 부하 발생기 (배경 곡선 3종 + 마케팅 스파이크, qa/load/sim/entrypoint.sh가 오케스트레이션) ----
  k6-runner:
    image: grafana/k6:0.52.0
    entrypoint: ["bash", "/qa/load/sim/entrypoint.sh"]
    # gapreport.js#handleSummary가 "qa/load/results/<id>-gap.json" 상대경로를 반환하므로
    # cwd를 "/"(= ./qa/load 마운트의 부모)로 고정해 그 상대경로가 /qa/load/results/ 에 떨어지게 한다.
    working_dir: /
    volumes:
      # k6 스크립트·lib(ro)와 실행 산출물(results, rw)을 함께 마운트 — 별도 볼륨 없이
      # 호스트 qa/load/results/ 에 gap report·로그가 그대로 남는다(상태 조회 보조 수단).
      - ./qa/load:/qa/load
    environment:
      QA_API_URL: ${QA_SIM_TARGET_URL:-http://nginx-lb}
      # 두 이름이 스크립트마다 다르다(b2c-diurnal-read.js·b2b-diurnal.js=TIME_SCALE,
      # b2c-diurnal-write.js=QA_TIME_SCALE) — 상시 운영 기본은 실시간(1). 둘 다 주입해
      # 어느 스크립트가 어느 이름을 읽든 동일 값을 적용한다.
      TIME_SCALE: ${QA_SIM_TIME_SCALE:-1}
      QA_TIME_SCALE: ${QA_SIM_TIME_SCALE:-1}
      QA_ENABLE_MARKETING_SPIKE: ${QA_SIM_ENABLE_MARKETING_SPIKE:-true}
      QA_SPIKE_START_TIME: ${QA_SIM_SPIKE_START_TIME:-0s}
      # ⑤ Prometheus remote-write receiver(docker-compose.observability.yml
      # --web.enable-remote-write-receiver, 이미 활성)로 push. observability.yml이
      # 병합되지 않은 조합에서는 이 호스트가 존재하지 않아 k6가 워닝만 내고 계속한다
      # (k6 output 연결 실패는 fatal이 아님 — 테스트 자체는 계속 진행).
      K6_PROMETHEUS_RW_SERVER_URL: http://prometheus:9090/api/v1/write
    # marketing-spike.js#setup()이 DROP_ID(env)를 요구(provision.sh가 .env.sim에 기록).
    # .env.sim 파일이 없어도(required: false) 기동은 계속되고, 그 경우 marketing-spike만
    # setup()에서 실패한다(배경 곡선 3종은 DROP_ID 불필요 — 영향 없음).
    env_file:
      - path: ./qa/load/.env.sim
        required: false
    # nginx-lb는 이 파일과 항상 함께 병합되는 ⑦ 소유 파일(docker-compose.lb.yml)의 서비스라
    # 참조해도 "최소 병합" 테스트 케이스에서 항상 존재한다. prometheus/grafana(⑤)는 항상
    # 존재한다고 보장할 수 없어 depends_on 대상에 넣지 않는다(위 헤더 주석 참고).
    depends_on:
      nginx-lb:
        condition: service_healthy
    # NFR "재충전이 관측 대상에 스파이크 유발 금지"와 동일 취지 — 부하 발생기 자체도
    # 리소스 상한을 둬 host 리소스 경합이 측정치를 왜곡하지 않게 한다(TDD "서버 토폴로지").
    deploy:
      resources:
        limits:
          cpus: "${QA_SIM_K6_CPU_LIMIT:-4.0}"
          memory: ${QA_SIM_K6_MEMORY_LIMIT:-4G}
    # k6 gracefulStop(시나리오 기본 30s) 동안 도착률이 0으로 수렴할 시간을 준다 — SIGKILL로
    # 끊기지 않도록 이보다 넉넉하게(entrypoint.sh 헤더 주석 참고).
    stop_grace_period: 45s
    restart: unless-stopped

  # ---- reseed: 10분 주기 synthetic 복원 배치 (INFRA-08 reseed.sh/.sql 실행) ----
  reseed:
    build:
      context: ./qa/load/reseed
      dockerfile: Dockerfile
    image: sports-sim-reseed:local
    working_dir: /workspace
    command: ["/workspace/qa/load/reseed/reseed.sh"]
    volumes:
      - ./qa/load:/workspace/qa/load:ro
    environment:
      # MYSQL_HOST/REDIS_HOST를 서비스명으로 명시하면 reseed.sh가 docker exec 폴백 없이
      # 컨테이너 네트워크로 직접 접속한다(도커 소켓 마운트 불필요 — reseed.sh#run_mysql_file
      # "MYSQL_HOST 직접 접속" 경로, 같은 default 네트워크에 있어 서비스명 DNS로 해석됨).
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: sports
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RESEED_INTERVAL_SECONDS: ${QA_SIM_RESEED_INTERVAL_SECONDS:-600}
      RESEED_RUN_ONCE: "false"
    env_file:
      - path: ./qa/load/.env.sim
        required: false
    # mysql/redis는 base(docker-compose.yml, ⑧)가 항상 정의 — 모든 유효 조합에 존재.
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped
