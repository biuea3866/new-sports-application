name: sports-app

# observability 스택(Grafana·Prometheus·Loki·Zipkin·zipkin-mysql·otel-collector)을 함께 기동.
# `docker compose up` 한 번으로 minio + observability 전체가 올라옵니다.
include:
  - ./observability/docker-compose.yml

services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: |
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/sports-app;
      "

volumes:
  minio-data:
