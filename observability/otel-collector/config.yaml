# OpenTelemetry Collector — web/mobile 트레이스 수신 허브.
# OTLP(gRPC 4317 / HTTP 4318)로 받아 Zipkin v2 엔드포인트로 전달합니다.
# 백엔드는 Brave 로 Zipkin 에 직접 전송하므로 이 콜렉터를 거치지 않습니다.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        # 브라우저/Expo web 클라이언트가 직접 전송할 때를 위한 CORS 허용
        cors:
          allowed_origins:
            - http://localhost:3000
            - http://localhost:8081
            - http://localhost:19006

processors:
  batch: {}

exporters:
  zipkin:
    endpoint: http://zipkin:9411/api/v2/spans

service:
  telemetry:
    logs:
      level: warn
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [zipkin]
