# Loki 단일 프로세스 구성 — 로컬 자체 호스팅용.
# 청크/인덱스는 loki-data 볼륨(/loki)에 영속 저장됩니다.

auth_enabled: false

server:
  http_listen_port: 3100
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true
  volume_enabled: true
  retention_period: 744h  # 31일 — compactor 가 초과분 삭제

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem
