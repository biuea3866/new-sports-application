<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mock PG 결제창</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
    .card { background: white; border-radius: 12px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { margin-top: 0; color: #1a1a1a; }
    .info-row { display: flex; justify-content: space-between; margin: 8px 0; color: #555; }
    .amount { font-size: 1.8em; font-weight: bold; color: #333; text-align: center; margin: 20px 0; }
    .actions { display: flex; gap: 12px; margin-top: 24px; }
    button { flex: 1; padding: 14px; font-size: 1em; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .btn-approve { background: #007AFF; color: white; }
    .btn-approve:hover { background: #0056b3; }
    .btn-cancel  { background: #fff; color: #666; border: 1px solid #ddd; }
    .btn-cancel:hover { background: #f5f5f5; }
    .provider-badge { display: inline-block; background: #e8f0fe; color: #1a73e8; border-radius: 4px; padding: 3px 10px; font-size: 0.85em; font-weight: bold; }
    .note { font-size: 0.8em; color: #999; margin-top: 16px; text-align: center; }
  </style>
</head>
<body>
  <div class="card">
    <p><span class="provider-badge" id="provider-badge">PG</span></p>
    <h2>결제하기</h2>
    <div class="info-row"><span>주문번호</span><span id="order-id">-</span></div>
    <div class="info-row"><span>상품명</span><span id="item-name">-</span></div>
    <div class="amount" id="amount">-</div>
    <div id="bank-info" style="display:none; background:#f9f9f9; border-radius:6px; padding:12px; margin:12px 0; font-size:0.9em;"></div>
    <div class="actions">
      <button class="btn-approve" onclick="approve()">결제 승인</button>
      <button class="btn-cancel" onclick="cancel()">취소</button>
    </div>
    <p class="note">이것은 테스트용 Mock 결제창입니다. 실제 결제가 발생하지 않습니다.</p>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const tid = params.get('tid');
    const provider = location.pathname.split('/')[2];

    document.getElementById('provider-badge').textContent = (provider || 'PG').toUpperCase();

    async function loadTxInfo() {
      try {
        const resp = await fetch('/pg/transactions');
        const txs = await resp.json();
        const tx = txs.find(t => t.tid === tid);
        if (!tx) return;
        document.getElementById('order-id').textContent = tx.partnerOrderId;
        document.getElementById('item-name').textContent = tx.itemName;
        document.getElementById('amount').textContent = Number(tx.amount).toLocaleString() + '원';
        if (tx.virtualAccount) {
          const div = document.getElementById('bank-info');
          div.style.display = 'block';
          div.innerHTML = `<strong>입금 계좌 안내</strong><br>
            은행: ${tx.virtualAccount.bankName}<br>
            계좌번호: ${tx.virtualAccount.accountNumber}<br>
            예금주: ${tx.virtualAccount.holderName}<br>
            입금 기한: ${tx.virtualAccount.dueDate}`;
          document.querySelector('.btn-approve').textContent = '입금 확인 (모킹)';
        }
      } catch(e) { console.warn('tx 조회 실패', e); }
    }

    loadTxInfo();

    async function approve() {
      const resp = await fetch(`/pg/${provider}/approve`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tid }),
      });
      const data = await resp.json();
      if (resp.ok) {
        alert('결제 승인 완료!\n' + JSON.stringify(data, null, 2));
      } else {
        alert('승인 실패: ' + (data.error || resp.status));
      }
    }

    async function cancel() {
      const resp = await fetch(`/pg/${provider}/cancel`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tid }),
      });
      const data = await resp.json();
      if (resp.ok) {
        alert('결제 취소 완료!\n' + JSON.stringify(data, null, 2));
      } else {
        alert('취소 실패: ' + (data.error || resp.status));
      }
    }
  </script>
</body>
</html>
